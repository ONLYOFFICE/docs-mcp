name: Release

on:
  push:
    tags:
    - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{steps.version.outputs.version}}
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v6

    - name: Install NodeJS
      uses: actions/setup-node@v6
      with:
        node-version: 24
        registry-url: 'https://registry.npmjs.org/'
    
    - name: Install pnpm
      uses: pnpm/action-setup@v6
      with:
        version: 10

    - name: Store Version
      id: version
      run: echo "version=$(jq --raw-output ".version" package.json)" >> "$GITHUB_OUTPUT"

    - name: Install Dependencies
      run: pnpm install --frozen-lockfile

    - name: Build Application
      run: pnpm build

    - name: Archive Package
      run: pnpm pack

    - name: Upload Package
      uses: actions/upload-artifact@v4
      with:
        name: package
        path: "*.tgz"
        if-no-files-found: error

  npm:
    needs:
    - build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v6

    - name: Install NodeJS
      uses: actions/setup-node@v6
      with:
        node-version: 24
        registry-url: 'https://registry.npmjs.org/'
    
    - name: Install pnpm
      uses: pnpm/action-setup@v6
      with:
        version: 10

    - name: Download Package
      uses: actions/download-artifact@v8
      with:
        name: package

    - name: Configure Registry
      run: pnpm config set registry https://registry.npmjs.org

    - name: Publish Package
      run: pnpm publish *.tgz --no-git-checks --access public

  docker:
    needs:
    - build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DOCKERHUB_NAMESPACE: onlyoffice
      DOCKERHUB_REPOSITORY: docs-mcp
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v6

    - name: Setup QEMU
      uses: docker/setup-qemu-action@v4

    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{secrets.DOCKERHUB_USERNAME}}
        password: ${{secrets.DOCKERHUB_TOKEN}}

    - name: Extract Labels
      id: labels
      run: |
        labels=""
        while IFS= read -r c; do
          case "$c" in
          LABEL*)
            c=$(echo "$c" | sed "s/^LABEL[[:space:]]*//")
            n=$(echo "$c" | cut --delimiter="=" --fields=1)
            v=$(echo "$c" | cut --delimiter="=" --fields=2- | sed "s/\"//g")
            labels="$labels$n=$v\n"
            ;;
          esac
        done < Dockerfile
        if [ -n "$labels" ]; then
          labels=$(printf "%s" "$labels" | sed "s/\\\\n$//")
        fi
        printf "labels<<EOF\n%b\nEOF\n" "$labels" >> "$GITHUB_OUTPUT"

    - name: Extract Metadata
      id: metadata
      uses: docker/metadata-action@v5
      with:
        images: index.docker.io/${{env.DOCKERHUB_NAMESPACE}}/${{env.DOCKERHUB_REPOSITORY}}
        labels: ${{steps.labels.outputs.labels}}
        tags: |
          type=semver,pattern={{major}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}.{{minor}}.{{patch}}
          type=sha,format=short
          type=sha,format=long

    - name: Publish Image
      uses: docker/build-push-action@v6
      env:
        DOCKER_BUILD_RECORD_UPLOAD: false
      with:
        push: true
        platforms: linux/amd64,linux/arm64
        labels: ${{steps.metadata.outputs.labels}}
        tags: ${{steps.metadata.outputs.tags}}

    - name: Update Docker Hub Description
      uses: peter-evans/dockerhub-description@v4
      # Skip errors, until action is not supported OAT auth
      # https://github.com/peter-evans/dockerhub-description/issues/294
      continue-on-error: true
      with:
        username: ${{secrets.DOCKERHUB_USERNAME}}
        password: ${{secrets.DOCKERHUB_TOKEN}}
        repository: ${{env.DOCKERHUB_NAMESPACE}}/${{env.DOCKERHUB_REPOSITORY}}

  gh:
    needs:
    - build
    - npm
    - docker
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{github.token}}
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Download Artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: "{package}"
        merge-multiple: true

    - name: Create Release
      run: |
        gh release create "v${{needs.build.outputs.version}}" \
          --title "v${{needs.build.outputs.version}}" \
          --notes "See ${{github.server_url}}/${{github.repository}}/blob/master/CHANGELOG.md/"

    - name: Upload Package
      run: gh release upload "v${{needs.build.outputs.version}}" *.tgz
